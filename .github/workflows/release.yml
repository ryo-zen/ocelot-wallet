name: Release Binaries (Disabled)

on:
  workflow_dispatch:

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Block unsigned binary releases
        run: |
          echo "Binary release publishing is disabled while Ocelot Wallet is source-only."
          echo "Use .github/workflows/release-source.yml for source-only releases."
          echo "Re-enable binary releases only after signing, notarization, and updater trust are ready."
          exit 1
