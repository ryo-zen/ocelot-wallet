name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: bun install

      - uses: tauri-apps/tauri-action@action-v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Ocelot Wallet ${{ github.ref_name }}
          releaseBody: |
            ## Ocelot Wallet ${{ github.ref_name }}

            A secure non-custodial desktop wallet for ZeiCoin.

            ### Downloads
            - **Linux**: `.AppImage` (portable) or `.deb` (Debian/Ubuntu)
            - **macOS (Apple Silicon)**: `-aarch64.dmg`
            - **macOS (Intel)**: `-x64.dmg`
            - **Windows**: `.msi`

            ### Installation
            See the [README](https://github.com/ryo-zen/ocelot-wallet#readme) for setup instructions.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          args: ${{ matrix.args }}

      - name: Rename release assets
        if: github.ref_type == 'tag'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" \
            --jq '.assets[] | select(.name | startswith("Ocelot Wallet")) | [(.id | tostring), .name] | @tsv' | \
          while IFS=$'\t' read -r id name; do
            new_name=$(echo "$name" | sed 's/Ocelot Wallet/ocelot-wallet/')
            gh api --method PATCH "repos/${{ github.repository }}/releases/assets/$id" \
              -f name="$new_name" && echo "Renamed: $name -> $new_name" || echo "Already renamed: $name"
          done
