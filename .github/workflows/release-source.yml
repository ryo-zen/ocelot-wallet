name: Release (Source Only)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Create source release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.event.inputs.tag }}" \
            --title "Ocelot Wallet ${{ github.event.inputs.tag }}" \
            --notes "## Ocelot Wallet ${{ github.event.inputs.tag }}

          A secure non-custodial desktop wallet for ZeiCoin.

          ### Source Code
          Download the source archives below (zip or tar.gz) and build from source.

          ### Build Instructions
          See the [README](https://github.com/ryo-zen/ocelot-wallet#readme) for setup and build instructions." \
            --prerelease=${{ contains(github.event.inputs.tag, 'alpha') || contains(github.event.inputs.tag, 'beta') }}
